<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mi Extensión</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 10px; }
        .info { background: #f5f5f5; padding: 10px; border-radius: 4px; }
        pre { white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>Información del objeto</h2>
    <div id="content" class="info">Cargando...</div>

    <script>
        // Función que recibe el contexto de SmartConsole
        function onContext(context) {
            const contentDiv = document.getElementById('content');
            if (context && context.event && context.event.objects && context.event.objects.length > 0) {
                const obj = context.event.objects[0];
                contentDiv.innerHTML = `
                    <p><strong>Nombre:</strong> ${obj.name || 'N/A'}</p>
                    <p><strong>UID:</strong> ${obj.uid || 'N/A'}</p>
                    <p><strong>Tipo:</strong> ${obj.type || 'N/A'}</p>
                    <p><strong>Detalles completos:</strong></p>
                    <pre>${JSON.stringify(obj, null, 2)}</pre>
                `;
            } else {
                contentDiv.innerHTML = 'No se encontró información del objeto.';
            }
            console.log('Contexto recibido:', context);
        }

        // Esperar a que el DOM esté listo y solicitar el contexto
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof smxProxy !== 'undefined') {
                // Solicitar el contexto actual (y actualizaciones futuras)
                smxProxy.sendRequest('get-context', null, 'onContext');
            } else {
                document.getElementById('content').innerHTML = 'Error: smxProxy no está disponible. Asegúrate de que la extensión se ejecute dentro de SmartConsole.';
            }
        });
    </script>
</body>
</html>
