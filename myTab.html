<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mi Extensión</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        #info { background: #f5f5f5; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Información del objeto</h2>
    <div id="info">Cargando...</div>

    <script>
        // Función para mostrar el objeto obtenido
        function mostrarObjeto(obj) {
            const infoDiv = document.getElementById('info');
            if (obj) {
                infoDiv.innerHTML = `
                    <p><strong>Nombre:</strong> ${obj.name || 'N/A'}</p>
                    <p><strong>UID:</strong> ${obj.uid || 'N/A'}</p>
                    <p><strong>Tipo:</strong> ${obj.type || 'N/A'}</p>
                `;
            } else {
                infoDiv.innerText = 'No se pudo obtener el objeto.';
            }
        }

        // Intentar obtener el contexto de la extensión (método recomendado por Check Point)
        if (typeof smxProxy !== 'undefined') {
            // Usar la interacción oficial para obtener el contexto
            smxProxy.sendRequest("get-context", null, function(context) {
                console.log("Contexto recibido:", context);
                if (context && context.event && context.event.objects && context.event.objects.length > 0) {
                    // El primer objeto es el seleccionado
                    mostrarObjeto(context.event.objects[0]);
                } else {
                    document.getElementById('info').innerText = 'No hay objeto seleccionado.';
                }
            });
        } else {
            // Fallback: si smxProxy no está, mostrar mensaje
            document.getElementById('info').innerHTML = '<p style="color:red;">La extensión no se ejecuta dentro de SmartConsole.</p>';
            console.error("smxProxy no definido");
        }
    </script>
</body>
</html>
